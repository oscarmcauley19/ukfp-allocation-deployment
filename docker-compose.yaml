version: "3.8"

services:
  frontend:
    container_name: ukfp-allocation-frontend
    image: ukfp-allocation-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_HOST=ukfp-allocation-api
      - VITE_API_PORT=5000

  api:
    container_name: ukfp-allocation-api
    image: ukfp-allocation-api:latest
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_HOST=ukfp-allocation-redis
      - RABBITMQ_URL=amqp://guest:guest@ukfp-allocation-rabbitmq:5672//
    depends_on:
      - rabbitmq
      - redis

  worker:
    container_name: ukfp-allocation-worker
    image: ukfp-allocation-worker:latest
    volumes:
      - ../ukfp-allocation-worker:/app
    working_dir: /app/src
    command: celery -A celery_app worker --loglevel=info --pool=solo
    environment:
      - BROKER_URL=amqp://guest:guest@ukfp-allocation-rabbitmq:5672//
      - REDIS_HOST=ukfp-allocation-redis
      - REDIS_PORT=6379
    depends_on:
      - rabbitmq
      - redis

  rabbitmq:
    container_name: ukfp-allocation-rabbitmq
    image: rabbitmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    container_name: ukfp-allocation-redis
    image: "redis:alpine"
    ports:
      - "6379:6379"
